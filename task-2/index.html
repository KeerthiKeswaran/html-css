<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic Debit Card | UI Highlights</title>
    <!-- Descriptive Meta for SEO -->
    <meta name="description" content="A horizontal carousel of realistic debit card UI components built with semantic HTML and modern CSS. No JavaScript.">
    <!-- Link to the refined styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Main Container to hold the carousel -->
    <main class="page-container">
        <h1>Premium Card Carousel</h1>

        <!-- Section: Cards Container - Semantic grouping for the carousel layout -->
        <section class="card-carousel" id="card-carousel">
            
            <!-- Article: Single Card 1 - Semantic element representing a standalone component -->
            <article class="debit-card card-navy">
                <header class="card-header">
                    <img src="assets/bank-logo.png" alt="Global Bank Logo" class="bank-logo">
                    <span class="bank-name">GLOBAL BANK</span>
                </header>
                
                <div class="card-visuals">
                    <img src="assets/chip.png" alt="Security Chip" class="card-chip">
                </div>

                <div class="card-body">
                    <!-- Standard dummy card number format -->
                    <p class="card-number">1234 5678 9012 3456</p>
                    
                    <div class="card-info">
                        <div class="card-holder">
                            <span class="label">CARD HOLDER</span>
                            <p class="value">KEERTHI KESWARAN</p>
                        </div>
                        <div class="card-expiry">
                            <span class="label">EXPIRES</span>
                            <p class="value">12/28</p>
                        </div>
                    </div>
                </div>
            </article>

            <!-- Article: Single Card 2 -->
            <article class="debit-card card-gold">
                <header class="card-header">
                    <img src="assets/bank-logo.png" alt="Global Bank Logo" class="bank-logo">
                    <span class="bank-name">PLATINUM ELITE</span>
                </header>
                
                <div class="card-visuals">
                    <img src="assets/chip.png" alt="Security Chip" class="card-chip">
                </div>

                <div class="card-body">
                    <p class="card-number">9876 5432 1012 3948</p>
                    
                    <div class="card-info">
                        <div class="card-holder">
                            <span class="label">CARD HOLDER</span>
                            <p class="value">KEERTHI KESWARAN</p>
                        </div>
                        <div class="card-expiry">
                            <span class="label">EXPIRES</span>
                            <p class="value">05/30</p>
                        </div>
                    </div>
                </div>
            </article>

            <!-- Article: Single Card 3 - Reusing the navy theme with different details -->
            <article class="debit-card card-navy">
                <header class="card-header">
                    <img src="assets/bank-logo.png" alt="Global Bank Logo" class="bank-logo">
                    <span class="bank-name">BUSINESS PREFERRED</span>
                </header>
                
                <div class="card-visuals">
                    <img src="assets/chip.png" alt="Security Chip" class="card-chip">
                </div>

                <div class="card-body">
                    <p class="card-number">4321 8765 0098 1234</p>
                    
                    <div class="card-info">
                        <div class="card-holder">
                            <span class="label">CARD HOLDER</span>
                            <p class="value">VALUED CUSTOMER</p>
                        </div>
                        <div class="card-expiry">
                            <span class="label">EXPIRES</span>
                            <p class="value">08/25</p>
                        </div>
                    </div>
                </div>
            </article>

        </section>
    </main>

</body>
</html>
